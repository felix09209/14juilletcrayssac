<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14 Juillet chez les Zinzins</title>
    <!-- Tailwind CSS pour un design rapide et beau -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome pour les petites icônes sympa -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts pour le côté Guinguette -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Fredoka', sans-serif; }
        .font-title { font-family: 'Playfair Display', serif; }
        .guinguette-bg {
            background-color: #fdfaf6;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 16px 16px;
        }
        .active-tab { color: #b91c1c; border-bottom: 3px solid #b91c1c; }
    </style>
</head>
<body class="guinguette-bg min-h-screen pb-24 text-gray-800">

    <!-- HEADER STYLE GUINGUETTE -->
    <header class="bg-red-700 text-white text-center py-6 px-4 shadow-md border-b-4 border-yellow-500 sticky top-0 z-50">
        <h1 class="font-title text-3xl font-bold tracking-wide text-yellow-300">14 Juillet à Crayssac</h1>
        <p class="text-sm italic font-light mt-1">✨ Bienvenue chez les Zinzins ✨</p>
    </header>

    <!-- CONTENU PRINCIPAL (Dynamique en JS) -->
    <main id="main-content" class="max-w-md mx-auto p-4 space-y-6">
        <!-- Le contenu des onglets sera injecté ici -->
    </main>

    <!-- BARRE DE NAVIGATION EN BAS (Style Appli Mobile) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-50">
        <div class="max-w-md mx-auto flex justify-around text-center text-xs font-medium text-gray-500">
            <button onclick="switchTab('accueil')" id="tab-accueil" class="flex-1 py-3 active-tab transition">
                <i class="fa-solid fa-house-chimney text-lg block mb-1"></i> Accueil
            </button>
            <button onclick="switchTab('buffet')" id="tab-buffet" class="flex-1 py-3 transition">
                <i class="fa-solid fa-utensils text-lg block mb-1"></i> Buffet
            </button>
            <button onclick="switchTab('musique')" id="tab-musique" class="flex-1 py-3 transition">
                <i class="fa-solid fa-music text-lg block mb-1"></i> Musique
            </button>
            <button onclick="switchTab('petanque')" id="tab-petanque" class="flex-1 py-3 transition">
                <i class="fa-solid fa-circle text-lg block mb-1"></i> Pétanque
            </button>
        </div>
    </nav>

    <!-- LOGIQUE JAVASCRIPT POUR FAIRE TOURNER L'APPLI -->
    <script>
        // Données temporaires (sauvegardées dans le navigateur pour la démo)
        let buffetItems = JSON.parse(localStorage.getItem('zinzins-buffet')) || [
            { id: 1, poste: "🍻 Gestion Tireuse à bière", responsable: "Marc & Tom" },
            { id: 2, poste: "❄️ Rangement Chambre Froide", responsable: "Sophie" },
            { id: 3, poste: "🥩 Saucisses & Grillades", responsable: "Dédé" },
            { id: 4, poste: "🥗 Salades composées", responsable: "Mamie Zinzin" },
            { id: 5, poste: "🥐 Chips & Apéro", responsable: "" }
        ];

        let playlist = JSON.parse(localStorage.getItem('zinzins-playlist')) || [
            { id: 1, titre: "Les Démons de Minuit", artiste: "Images", ajoutePar: "L'Apero-Man" },
            { id: 2, titre: "3e sexe", artiste: "Indochine", ajoutePar: "Ju" }
        ];

        let joueursPetanque = JSON.parse(localStorage.getItem('zinzins-joueurs')) || ["Dédé", "Marc", "Sophie", "Jean", "Antoine", "Valérie"];
        let equipesGenerees = [];

        // Gestionnaire d'onglets
        function switchTab(tabName) {
            // Reset des styles de boutons
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`tab-${tabName}`).classList.add('active-tab');

            const content = document.getElementById('main-content');
            
            if (tabName === 'accueil') {
                content.innerHTML = `
                    <!-- CARD BIENVENUE -->
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-green-100 text-center space-y-3">
                        <span class="text-4xl">🌿</span>
                        <h2 class="font-title text-2xl font-bold text-green-800">L'Esprit de la Fête</h2>
                        <p class="text-gray-600 text-sm leading-relaxed">
                            Cette année à Crayssac, on mise sur le <strong>champêtre</strong>, la <strong>guinguette</strong>, la bonne bouffe et surtout l'apéro entre bons vivants ! Pas de chichis, de la bonne humeur.
                        </p>
                        <div class="flex justify-center gap-2 pt-2 text-xs text-red-700 font-semibold">
                            <span class="bg-red-50 px-3 py-1 rounded-full border border-red-200">#Pétanque</span>
                            <span class="bg-yellow-50 px-3 py-1 rounded-full border border-yellow-200">#Piscine</span>
                            <span class="bg-green-50 px-3 py-1 rounded-full border border-green-200">#Zinzins</span>
                        </div>
                    </div>

                    <!-- INFOS PRATIQUES -->
                    <div class="bg-amber-50 rounded-2xl p-5 shadow-sm border border-amber-200 space-y-4">
                        <h3 class="font-bold text-lg text-amber-900 flex items-center gap-2">
                            <i class="fa-solid fa-circle-info"></i> Infos Cruciales de la Ferme
                        </h3>
                        <div class="space-y-3 text-sm text-amber-950">
                            <div class="flex items-start gap-3">
                                <i class="fa-solid fa-wifi mt-1 text-amber-700"></i>
                                <div><strong>Wi-Fi de la Ferme :</strong> <code class="bg-white px-2 py-0.5 rounded border text-red-600 font-mono">4G_CAMPAGNE_ZINZINS</code></div>
                            </div>
                            <div class="flex items-start gap-3">
                                <i class="fa-solid fa-swimming-pool mt-1 text-amber-700"></i>
                                <div><strong>Piscine & Château gonflable :</strong> En accès libre, mais surveillance parentale obligatoire pour les petits zinzins !</div>
                            </div>
                            <div class="flex items-start gap-3">
                                <i class="fa-solid fa-glass-water mt-1 text-amber-700"></i>
                                <div><strong>Verres personnalisés :</strong> Récupère ton verre avec ton prénom à l'entrée, tu le gardes toute la journée !</div>
                            </div>
                        </div>
                    </div>
                `;
            } 
            
            else if (tabName === 'buffet') {
                content.innerHTML = `
                    <div class="bg-white rounded-2xl p-5 shadow-sm border space-y-4">
                        <h2 class="font-title text-2xl font-bold text-red-800 flex items-center gap-2">
                            <i class="fa-solid fa-mound"></i> L'Auberge Espagnole
                        </h2>
                        <p class="text-xs text-gray-500">Pour éviter d'avoir 12 salades de tomates et pas de viande, inscris-toi sur un poste ou ajoute ce que tu amènes !</p>
                        
                        <div class="space-y-2 mt-4" id="buffet-list">
                            ${buffetItems.map(item => `
                                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100">
                                    <div>
                                        <div class="font-semibold text-sm">${item.poste}</div>
                                        <div class="text-xs ${item.responsable ? 'text-green-600 font-medium' : 'text-amber-500 italic'}">
                                            ${item.responsable ? `🙋‍♂️ Géré par : ${item.responsable}` : '⏳ Personne encore !'}
                                        </div>
                                    </div>
                                    ${!item.responsable ? `
                                        <button onclick="rejoindreBuffet(${item.id})" class="text-xs bg-green-700 text-white px-3 py-1.5 rounded-lg hover:bg-green-800 font-semibold shadow-xs">
                                            Je m'en occupe
                                        </button>
                                    ` : ''}
                                </div>
                            `).join('')}
                        </div>

                        <!-- AJOUTER UN TRUC -->
                        <div class="pt-4 border-t border-gray-100 space-y-2">
                            <div class="text-sm font-semibold">Tu amènes autre chose ?</div>
                            <div class="flex gap-2">
                                <input id="new-item-name" type="text" placeholder="Ex: Gâteau au chocolat, Glaçons..." class="flex-1 text-sm border rounded-xl px-3 py-2 focus:outline-red-700">
                                <input id="new-item-user" type="text" placeholder="Ton prénom" class="w-1/3 text-sm border rounded-xl px-3 py-2 focus:outline-red-700">
                                <button onclick="addBuffetItem()" class="bg-red-700 text-white px-3 rounded-xl"><i class="fa-solid fa-plus"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            } 
            
            else if (tabName === 'musique') {
                content.innerHTML = `
                    <div class="bg-white rounded-2xl p-5 shadow-sm border space-y-4">
                        <h2 class="font-title text-2xl font-bold text-red-800 flex items-center gap-2">
                            <i class="fa-solid fa-radio"></i> La Playlist des Zinzins
                        </h2>
                        <p class="text-xs text-gray-500">Ajoutez vos morceaux préférés. Le jour J, tout sera balancé sur les grosses enceintes de la guinguette !</p>
                        
                        <!-- EXPORT DEEZER -->
                        <button onclick="copierPourDeezer()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-amber-950 font-bold py-2 px-4 rounded-xl text-sm flex items-center justify-center gap-2 shadow-xs transition">
                            <i class="fa-solid fa-copy"></i> Copier la liste pour Deezer
                        </button>

                        <!-- FORMULAIRE AJOUT -->
                        <div class="bg-gray-50 p-3 rounded-xl border space-y-2">
                            <div class="text-xs font-bold text-gray-600 uppercase tracking-wider">Proposer un morceau</div>
                            <input id="music-title" type="text" placeholder="Titre de la chanson" class="w-full text-sm border rounded-lg px-3 py-2">
                            <div class="flex gap-2">
                                <input id="music-artist" type="text" placeholder="Artiste / Groupe" class="flex-1 text-sm border rounded-lg px-3 py-2">
                                <input id="music-user" type="text" placeholder="Ton nom" class="w-1/3 text-sm border rounded-lg px-3 py-2">
                            </div>
                            <button onclick="addMusic()" class="w-full bg-red-700 hover:bg-red-800 text-white py-2 rounded-lg text-sm font-semibold">
                                Ajouter à la liste
                            </button>
                        </div>

                        <!-- LISTE DES MUSIQUES -->
                        <div class="space-y-2 max-h-60 overflow-y-auto pr-1" id="music-list">
                            ${playlist.map(m => `
                                <div class="flex items-center justify-between p-2.5 bg-white border border-gray-100 rounded-lg shadow-2xs">
                                    <div>
                                        <div class="font-semibold text-sm">${m.titre}</div>
                                        <div class="text-xs text-gray-500">${m.artiste}</div>
                                    </div>
                                    <span class="text-[10px] bg-gray-100 px-2 py-0.5 rounded-full text-gray-600 italic">Par ${m.ajoutePar}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } 
            
            else if (tabName === 'petanque') {
                content.innerHTML = `
                    <div class="bg-white rounded-2xl p-5 shadow-sm border space-y-4">
                        <h2 class="font-title text-2xl font-bold text-green-800 flex items-center gap-2">
                            <i class="fa-solid fa-circle-dot"></i> Tournoi de Pétanque & Co
                        </h2>
                        <p class="text-xs text-gray-500">Inscrivez votre nom pour le tirage au sort des doublettes/triplettes de l'apéro.</p>
                        
                        <!-- AJOUT JOUEUR -->
                        <div class="flex gap-2">
                            <input id="player-name" type="text" placeholder="Nom du joueur" class="flex-1 text-sm border rounded-xl px-3 py-2">
                            <button onclick="addPlayer()" class="bg-green-700 text-white px-4 rounded-xl font-semibold text-sm">Inscrire</button>
                        </div>

                        <!-- LES INSCRITS -->
                        <div>
                            <div class="text-xs font-bold text-gray-500 mb-2">Les tireurs/pointeurs inscrits (<span id="player-count">${joueursPetanque.length}</span>) :</div>
                            <div id="players-chips" class="flex flex-wrap gap-1.5">
                                ${joueursPetanque.map((p, index) => `
                                    <span class="bg-gray-100 border text-xs px-2.5 py-1 rounded-full flex items-center gap-1.5 font-medium">
                                        ${p} <i onclick="removePlayer(${index})" class="fa-solid fa-xmark text-gray-400 hover:text-red-500 cursor-pointer text-[10px]"></i>
                                    </span>
                                `).join('')}
                            </div>
                        </div>

                        <!-- GENERATEUR -->
                        <button onclick="genererEquipes()" class="w-full bg-red-700 hover:bg-red-800 text-white font-bold py-2.5 px-4 rounded-xl text-sm shadow-sm transition">
                            🎲 Lancer le Tirage au Sort des Équipes
                        </button>

                        <!-- RESULTAT SOUHAITÉ -->
                        <div id="resultat-equipes" class="space-y-2">
                            ${renderEquipes()}
                        </div>
                    </div>
                `;
            }
        }

        // --- FONCTIONS LOGIQUES DE L'APPLI ---

        // Buffet
        function rejoindreBuffet(id) {
            let prenom = prompt("Quel est ton prénom, cher Zinzin ?");
            if (prenom) {
                let item = buffetItems.find(i => i.id === id);
                if (item) item.responsable = prenom;
                saveAndRefresh('buffet');
            }
        }

        function addBuffetItem() {
            let poste = document.getElementById('new-item-name').value;
            let responsable = document.getElementById('new-item-user').value;
            if (!poste) return alert("Dis-nous ce que tu amènes !");
            
            buffetItems.push({
                id: Date.now(),
                poste: "🥗 " + poste,
                responsable: responsable
            });
            saveAndRefresh('buffet');
        }

        // Musique
        function addMusic() {
            let titre = document.getElementById('music-title').value;
            let artiste = document.getElementById('music-artist').value;
            let user = document.getElementById('music-user').value || "Anonyme";

            if (!titre || !artiste) return alert("Remplis au moins le titre et l'artiste !");

            playlist.unshift({ id: Date.now(), titre, artiste, ajoutePar: user });
            saveAndRefresh('musique');
        }

        function copierPourDeezer() {
            if (playlist.length === 0) return alert("La liste est vide pour l'instant !");
            
            // Formatage propre : "Artiste - Titre" ligne par ligne
            let texteDeezer = playlist.map(m => `${m.artiste} - ${m.titre}`).join('\n');
            
            navigator.clipboard.writeText(texteDeezer).then(() => {
                alert("👉 Liste copiée dans votre presse-papier !\nIl vous suffit d'aller sur Deezer (ou un site comme Soundiiz) et de faire 'Coller' pour créer votre playlist automatiquement.");
            }).catch(err => {
                alert("Erreur lors de la copie : ", err);
            });
        }

        // Pétanque
        function addPlayer() {
            let name = document.getElementById('player-name').value;
            if (!name) return;
            joueursPetanque.push(name);
            saveAndRefresh('petanque');
        }

        function removePlayer(index) {
            joueursPetanque.splice(index, 1);
            saveAndRefresh('petanque');
        }

        function genererEquipes() {
            if (joueursPetanque.length < 2) return alert("Il faut au moins 2 joueurs pour faire une partie !");
            
            // Mélange de l'arbre des joueurs (Fisher-Yates shuffle)
            let CopieJoueurs = [...joueursPetanque];
            for (let i = CopieJoueurs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [CopieJoueurs[i], CopieJoueurs[j]] = [CopieJoueurs[j], CopieJoueurs[i]];
            }

            equipesGenerees = [];
            let equipeNum = 1;

            // On fait des doublettes par défaut. S'il reste 3 personnes, on fait une triplette à la fin.
            while (CopieJoueurs.length > 0) {
                if (CopieJoueurs.length === 3) {
                    equipesGenerees.push({ nom: `Équipe ${equipeNum}`, membres: [CopieJoueurs.pop(), CopieJoueurs.pop(), CopieJoueurs.pop()] });
                } else if (CopieJoueurs.length >= 2) {
                    equipesGenerees.push({ nom: `Équipe ${equipeNum}`, membres: [CopieJoueurs.pop(), CopieJoueurs.pop()] });
                } else {
                    // Si vraiment tout seul à la fin (nombre impair)
                    equipesGenerees.push({ nom: `Équipe ${equipeNum}`, membres: [CopieJoueurs.pop()] });
                }
                equipeNum++;
            }
            
            document.getElementById('resultat-equipes').innerHTML = renderEquipes();
        }

        function renderEquipes() {
            if (equipesGenerees.length === 0) return "";
            return `
                <div class="mt-4 p-3 bg-green-50 border border-green-200 rounded-xl space-y-2">
                    <div class="text-xs font-bold text-green-800 uppercase tracking-wide flex items-center justify-between">
                        <span>🎯 Équipes Tirées au Sort :</span>
                        <span class="text-[10px] lowercase text-green-600 font-normal">Généré à l'instant</span>
                    </div>
                    <div class="grid grid-cols-1 gap-2">
                        ${equipesGenerees.map(eq => `
                            <div class="bg-white p-2 rounded border border-green-100 shadow-3xs text-sm">
                                <strong class="text-green-700">${eq.nom} :</strong> ${eq.membres.join(' & ')}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // Sauvegarde globale locale
        function saveAndRefresh(currentTab) {
            localStorage.setItem('zinzins-buffet', JSON.stringify(buffetItems));
            localStorage.setItem('zinzins-playlist', JSON.stringify(playlist));
            localStorage.setItem('zinzins-joueurs', JSON.stringify(joueursPetanque));
            switchTab(currentTab);
        }

        // Lancement par défaut sur l'accueil
        switchTab('accueil');
    </script>
</body>
</html>
